services:
  besu:
    image: hyperledger/besu:latest
    ports:
      - "8545:8545"
      - "8546:8546"
    volumes:
      - ./data:/data
      - ./config:/config
    command: >
      --genesis-file=/config/genesis.json
      --config-file=/config/config.toml
      --data-path=/data
      --rpc-http-cors-origins="*"
      --host-allowlist="*"
      --min-gas-price=0